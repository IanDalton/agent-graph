# Serve the built SPA and proxy the API to the backend service.
# `backend` resolves via the compose network DNS.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + SSE -> FastAPI. Buffering off so the chat stream flushes token-by-token.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming (text/event-stream) needs these.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
    }

    # SPA fallback: every non-file route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
