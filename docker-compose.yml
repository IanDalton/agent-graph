# Full stack for agent-graph, with dev/prod profiles.
#
#   docker compose --profile dev  up --build    # hot-reloading dev stack
#   docker compose --profile prod up --build    # built/served prod stack
#   docker compose build sandbox                # the agent-sandbox image run_python launches
#
# A Caddy reverse proxy is the SINGLE entry point: it publishes ${APP_PORT:-8080} and is the
# only service with a host port. Everything is reached through it on one origin —
# the SPA at / and the API/SSE at /api. backend/frontend/arcadedb/searxng have no published
# ports; they talk over the compose network. Each profile gets its own caddy (caddy / caddy-dev)
# pointing at that profile's backend+frontend.
#
# arcadedb + searxng have NO profile, so they always start. Env/secrets are read from .env.

# Shared backend config; the prod + dev backend services each add their own command/volumes.
x-backend: &backend
  build:
    context: .
    dockerfile: backend/Dockerfile
  image: agent-graph-backend
  env_file:
    - .env
  environment:
    # Service-network endpoints (override the localhost defaults baked into the code).
    ARCADE_URL: http://arcadedb:2480
    SEARXNG_URL: http://searxng:8080
    # Shared sandbox scratch dir: mounted at the SAME path here and on the host so the nested
    # `docker run -v {tmp}:/out` the runner emits round-trips /out artifacts. See TMPDIR.
    TMPDIR: ${SANDBOX_SHARED_DIR:-/sandbox-tmp}
    # Where downloaded GGUF models live (the local llama.cpp library). Mounted from a shared volume
    # (see below) so the optional `llamacpp` service reads the same files. LLAMACPP_BASE_URL is left
    # to .env (the user points it at their external llama-server) so it isn't overridden here.
    LLAMACPP_MODELS_DIR: /models
    # The llama-server *container* name (resolvable on the host daemon via the mounted docker.sock).
    # The Model Manager `docker exec`s it for GPU auto-detect and recreates it to load a model. Only
    # relevant when llama-server is the bundled local Docker container (the `llamacpp` service).
    LLAMACPP_CONTAINER: ${LLAMACPP_CONTAINER:-agent_graph_llamacpp}
    # Make uvicorn's --reload watcher poll: inotify events don't cross the Docker bind mount
    # on Windows/macOS hosts, so native watching misses host edits. Inert in prod (no --reload).
    WATCHFILES_FORCE_POLLING: "true"
  # No host port: the backend is reached through Caddy at /api on the compose network.
  expose:
    - "8000"
  depends_on:
    - arcadedb
    - searxng
  restart: unless-stopped

services:
  # --- infra (always on; needed by both profiles) ---
  arcadedb:
    image: arcadedata/arcadedb:latest
    container_name: agent_memory_db
    environment:
      - JAVA_OPTS=-Darcadedb.server.rootPassword=playwithdata -Darcadedb.server.defaultDatabases=AgentMemory[admin:playwithdata]
      # Disable the JMX remote agent. The image's server.sh enables it by default with an
      # unresolvable RMI hostname, which makes the JVM abort on startup ("Unable to resolve
      # hostname") inside the container. Setting ARCADEDB_JMX (non-empty) skips that default block.
      - ARCADEDB_JMX=-Dcom.sun.management.jmxremote=false
    # Internal only: reached as http://arcadedb:2480 on the compose network.
    expose:
      - "2480" # HTTP API
      - "2424" # Binary port
    volumes:
      - arcadedb_data:/home/arcadedb/databases
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    # Internal only: the backend calls http://searxng:8080 on the compose network.
    expose:
      - "8080"
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    restart: unless-stopped

  # --- backend (one per profile; both publish :8000, only one runs at a time) ---
  backend:
    <<: *backend
    profiles: ["prod"]
    container_name: agent_graph_backend
    volumes:
      # Docker-out-of-Docker: run_python launches sandbox containers on the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Same-path shared scratch (see TMPDIR above).
      - ${SANDBOX_SHARED_DIR:-/sandbox-tmp}:${SANDBOX_SHARED_DIR:-/sandbox-tmp}
      # Downloaded GGUF models. A named volume by default; set MODELS_HOST_DIR to a host path to
      # share them with a llama-server running on the host instead.
      - ${MODELS_HOST_DIR:-llamacpp_models}:/models

  backend-dev:
    <<: *backend
    profiles: ["dev"]
    container_name: agent_graph_backend_dev
    # Reload on source changes; the bind mount below keeps /app/backend in sync with the host.
    command:
      ["uvicorn", "backend.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "backend"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SANDBOX_SHARED_DIR:-/sandbox-tmp}:${SANDBOX_SHARED_DIR:-/sandbox-tmp}
      - ${MODELS_HOST_DIR:-llamacpp_models}:/models
      # Live source for hot reload.
      - ./backend:/app/backend

  # --- frontend (one per profile) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: agent-graph-frontend
    container_name: agent_graph_frontend
    profiles: ["prod"]
    # No host port: served to the browser through Caddy. nginx still serves the SPA internally.
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-dev:
    image: node:22-alpine
    container_name: agent_graph_frontend_dev
    profiles: ["dev"]
    working_dir: /app
    # Install deps into the named node_modules volume, then run Vite with HMR.
    command: sh -c "npm install && npm run dev"
    environment:
      # Proxy target the Vite server uses (see frontend/vite.config.ts).
      API_PROXY_TARGET: http://backend-dev:8000
      # Poll for file changes: the host bind mount doesn't deliver inotify events to the
      # container on Windows/macOS, so Vite's native watcher misses edits and HMR never fires.
      VITE_USE_POLLING: "true"
    # No host port: reached through Caddy (which also forwards the Vite HMR WebSocket).
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      # Keep container-built node_modules from being shadowed by the host mount.
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-dev
    restart: unless-stopped

  # --- caddy reverse proxy (the single published entry point; one per profile) ---
  caddy:
    image: caddy:2-alpine
    container_name: agent_graph_caddy
    profiles: ["prod"]
    environment:
      BACKEND_UPSTREAM: backend:8000
      FRONTEND_UPSTREAM: frontend:80
    ports:
      # The ONLY host port: the whole app at http://localhost:${APP_PORT:-8080}
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  caddy-dev:
    image: caddy:2-alpine
    container_name: agent_graph_caddy_dev
    profiles: ["dev"]
    environment:
      BACKEND_UPSTREAM: backend-dev:8000
      FRONTEND_UPSTREAM: frontend-dev:5173
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend-dev
      - frontend-dev
    restart: unless-stopped

  # Build-only: produces the `agent-sandbox` image run_python launches per call
  # (`docker compose build sandbox`). The profile keeps `up` from ever starting it.
  sandbox:
    build: ./docker/sandbox
    image: agent-sandbox
    command: ["python", "--version"]
    profiles: ["build-only"]

  # --- optional local llama.cpp server (NVIDIA/CUDA) ---
  # Opt-in only (`docker compose --profile llamacpp up llamacpp`). It serves the GGUFs from the shared
  # models volume; point LLAMACPP_BASE_URL at it (e.g. http://llamacpp:8080/v1). Needs the NVIDIA
  # Container Toolkit on the host. When run this way (a local container the backend reaches over the
  # mounted docker.sock — see LLAMACPP_CONTAINER), the Model Manager's "Load" button can RECREATE this
  # container to serve a different model: it replicates this config (image, network alias `llamacpp`,
  # models volume, CDI GPU device, restart policy) and changes only the command. A recreate detaches
  # it from compose until the next `docker compose --profile llamacpp up -d llamacpp` reconciles it.
  # You can still set the initial `command` by hand below (or via LLAMACPP_HF_REPO/CTX/NGL).
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: agent_graph_llamacpp
    profiles: ["llamacpp"]
    # Self-downloads the model via -hf (no manual file placement). Override LLAMACPP_HF_REPO with any
    # HuggingFace GGUF "repo:quant" — pick one in the Model Manager's Discover tab (it shows what fits
    # your GPU). To instead serve a file you downloaded through the Model Manager, swap the command to:
    #   ["-m", "/models/<file>.gguf", "-c", "8192", "-ngl", "99", "--flash-attn", "on",
    #    "--host", "0.0.0.0", "--port", "8080"]
    command:
      ["-hf", "${LLAMACPP_HF_REPO:-bartowski/Qwen2.5-7B-Instruct-GGUF:Q4_K_M}",
       "-c", "${LLAMACPP_CTX:-8192}", "-ngl", "${LLAMACPP_NGL:-99}", "--flash-attn", "on",
       "--host", "0.0.0.0", "--port", "8080"]
    environment:
      # Persist -hf downloads onto the shared volume instead of the container's ephemeral cache.
      LLAMA_CACHE: /models
    expose:
      - "8080"
    volumes:
      - ${MODELS_HOST_DIR:-llamacpp_models}:/models
    # GPU via CDI (this host exposes nvidia.com/gpu through the NVIDIA Container Toolkit). Hosts that
    # registered the legacy `nvidia` Docker runtime instead can replace `devices` with:
    #   deploy: {resources: {reservations: {devices: [{driver: nvidia, count: all, capabilities: [gpu]}]}}}
    devices:
      - "nvidia.com/gpu=all"
    restart: unless-stopped

volumes:
  arcadedb_data:
  frontend_node_modules:
  caddy_data:
  caddy_config:
  llamacpp_models:
